name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      # Only a presence flag lives at job scope so the `if` gate below can read
      # it; the actual signing secret values are scoped to the signing step so
      # third-party actions (tauri-action, rust-toolchain) and dependency/build
      # steps (npm ci, cargo build) never see them.
      HAS_SIGNING_CERT: ${{ secrets.CODE_SIGN_PFX != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust stable
        # Pinned to a commit on the action's `stable` branch; toolchain input
        # keeps selecting the current stable Rust channel at build time.
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable

      - name: Install dependencies
        run: npm ci

      - name: Build maintenance-helper
        run: cargo build --release -p maintenance-helper

      - name: Copy maintenance-helper to Tauri resources
        shell: pwsh
        run: |
          $source = "target\release\maintenance-helper.exe"
          $dest = "src-tauri\resources\maintenance-helper.exe"
          New-Item -ItemType Directory -Path "src-tauri\resources" -Force | Out-Null
          Copy-Item -LiteralPath $source -Destination $dest -Force

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: Noten v__VERSION__
          releaseDraft: true

      - name: Copy NSIS payload into bootstrapper assets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "[1/1] Copying NSIS bundle to bootstrapper assets..."
          $destination = Join-Path $PWD "bootstrapper\assets\nsis-payload.exe"
          $source = Get-ChildItem (Join-Path $PWD "src-tauri\target\release\bundle\nsis\Noten_*_x64-setup.exe") |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $source) {
            throw "NSIS bundle not found under src-tauri\\target\\release\\bundle\\nsis"
          }

          Copy-Item -LiteralPath $source -Destination $destination -Force

      - name: Build bootstrapper
        run: cargo build --release -p noten-setup

      - name: Code sign bootstrapper
        if: ${{ env.HAS_SIGNING_CERT == 'true' }}
        shell: pwsh
        env:
          CODE_SIGN_PFX: ${{ secrets.CODE_SIGN_PFX }}
          CODE_SIGN_PFX_PASSWORD: ${{ secrets.CODE_SIGN_PFX_PASSWORD }}
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "[1/3] Writing code signing certificate..."
          $certPath = Join-Path $PWD "cert.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:CODE_SIGN_PFX))

          try {
            Write-Host "[2/3] Locating signtool..."
            $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
              Sort-Object FullName -Descending |
              Select-Object -First 1 -ExpandProperty FullName

            if (-not $signtool) {
              throw "signtool.exe not found"
            }

            Write-Host "[3/3] Signing bootstrapper executable..."
            & $signtool sign /f $certPath /p $env:CODE_SIGN_PFX_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 "target\release\noten-setup.exe"

            if ($LASTEXITCODE -ne 0) {
              throw "signtool failed with exit code $LASTEXITCODE"
            }
          }
          finally {
            Remove-Item -LiteralPath $certPath -Force -ErrorAction SilentlyContinue
          }

      - name: Upload bootstrapper to GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          files: target/release/noten-setup.exe
